<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALF Archive Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #fff;
            overflow: hidden;
        }
        .bg-main {
            background-color: #121212;
        }
        .track-row:hover {
            background-color: rgba(255, 255, 255, 0.07);
        }
        .track-row.active .track-title-text {
            color: #1DB954;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        #loading-indicator {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background-color: #1DB954;
            z-index: 100;
            transition: width 0.3s ease, opacity 0.3s ease;
            box-shadow: 0 0 10px #1DB954;
        }
        input[type="range"] {
            accent-color: #1DB954;
            cursor: pointer;
            height: 4px;
        }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div id="loading-indicator"></div>

    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 flex flex-col overflow-hidden bg-main relative">
            
            <div class="relative flex-1 overflow-y-auto custom-scrollbar" id="scroll-container">
                <header class="p-8 flex flex-col md:flex-row items-end space-y-4 md:space-y-0 md:space-x-6 pt-16 bg-[#121212]">
                    <div class="w-48 h-48 md:w-56 md:h-56 shadow-2xl bg-zinc-800 flex items-center justify-center overflow-hidden rounded-md">
                        <img id="album-art" src="https://i.pinimg.com/736x/b7/41/6e/b7416eadda070a5c8553d4c463423b08.jpg" alt="ALF Cover" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col space-y-2">
                        <span class="text-xs font-bold uppercase tracking-widest text-zinc-400">kostenlos und legal</span>
                        <h1 class="text-4xl md:text-7xl font-black tracking-tighter" id="album-title">ALF Hörspiele</h1>
                        <div class="flex items-center space-x-2 text-sm font-medium">
                            <span class="text-green-500">pidi</span>
                            <span class="text-gray-400">• <span id="track-count">0</span> episodes</span>
                        </div>
                    </div>
                </header>

                <div class="p-8 flex items-center space-x-4">
                    <button id="master-play" class="w-14 h-14 bg-green-500 rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition-transform active:scale-95">
                        <i data-lucide="play" class="fill-black text-black ml-1"></i>
                    </button>
                    <a id="download-zip" href="#" target="_blank" class="flex items-center space-x-2 px-6 py-2 border border-zinc-600 rounded-full text-sm font-bold hover:border-white transition-colors">
                        <i data-lucide="download" class="w-4 h-4"></i>
                        <span>DOWNLOAD</span>
                    </a>
                </div>

                <div class="px-8 pb-24">
                    <div class="grid grid-cols-[32px_1fr_80px_40px] md:grid-cols-[32px_1fr_100px_80px_40px] gap-4 px-4 py-2 text-zinc-400 text-xs font-bold border-b border-white/5 sticky top-0 bg-[#121212] z-10 mb-4">
                        <span>#</span>
                        <span>NAME</span>
                        <span class="hidden md:block">SIZE</span>
                        <span class="flex justify-end"><i data-lucide="clock" class="w-4 h-4"></i></span>
                        <span></span>
                    </div>
                    <div id="track-list" class="space-y-1">
                        <div class="flex flex-col items-center justify-center py-20 text-zinc-500">
                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-500 mb-4"></div>
                            <p>lade...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="h-24 bg-black border-t border-zinc-900 px-4 flex items-center justify-between z-20">
        <!-- Left: Now Playing -->
        <div class="flex items-center space-x-4 w-[30%]">
            <div class="hidden sm:block w-14 h-14 bg-zinc-800 rounded flex-shrink-0 overflow-hidden shadow-lg">
                <img id="now-playing-img" src="https://archive.org/services/img/alfhoerspiele" class="w-full h-full object-cover" alt="Track">
            </div>
            <div class="flex flex-col min-w-0">
                <span id="current-title" class="text-sm font-semibold truncate text-white">Spiele eine Folge</span>
                <span class="text-[11px] text-zinc-400 truncate">ALF-Archiv</span>
            </div>
        </div>

        <!-- Center: Controls -->
        <div class="flex flex-col items-center w-[40%] max-w-xl">
            <div class="flex items-center space-x-6 mb-2">
                <button id="prev-btn" class="text-zinc-400 hover:text-white transition-colors">
                    <i data-lucide="skip-back" class="w-5 h-5 fill-current"></i>
                </button>
                <button id="play-pause-btn" class="w-8 h-8 bg-white rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-md">
                    <i data-lucide="play" class="w-5 h-5 fill-black text-black ml-0.5"></i>
                </button>
                <button id="next-btn" class="text-zinc-400 hover:text-white transition-colors">
                    <i data-lucide="skip-forward" class="w-5 h-5 fill-current"></i>
                </button>
            </div>
            <div class="flex items-center space-x-2 w-full">
                <span id="current-time" class="text-[10px] text-zinc-500 min-w-[30px] text-right">0:00</span>
                <input type="range" id="progress-slider" min="0" max="100" value="0" class="flex-1">
                <span id="duration" class="text-[10px] text-zinc-500 min-w-[30px]">0:00</span>
            </div>
        </div>

        <!-- Right: Volume -->
        <div class="flex items-center justify-end space-x-3 w-[30%]">
            <i data-lucide="volume-2" class="w-4 h-4 text-zinc-400"></i>
            <input type="range" id="volume-slider" min="0" max="100" value="70" class="w-16 md:w-24">
        </div>
    </footer>

    <audio id="audio-player"></audio>

    <script>
        const identifier = 'alfhoerspiele';
        const metadataUrl = `https://archive.org/metadata/${identifier}`;
        const downloadUrl = `https://archive.org/download/${identifier}`;
        
        const audio = document.getElementById('audio-player');
        const trackListContainer = document.getElementById('track-list');
        const currentTitleEl = document.getElementById('current-title');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const masterPlayBtn = document.getElementById('master-play');
        const progressSlider = document.getElementById('progress-slider');
        const volumeSlider = document.getElementById('volume-slider');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const loadingIndicator = document.getElementById('loading-indicator');
        const zipBtn = document.getElementById('download-zip');

        let tracks = [];
        let currentIndex = -1;
        let isPlaying = false;

        async function fetchArchiveData() {
            setLoading(30);
            try {
                const response = await fetch(metadataUrl);
                const data = await response.json();
                
                // Filtering for MP3s and applying natural alphanumeric sort
                tracks = data.files
                    .filter(file => file.format === 'VBR MP3' || file.format === 'MP3')
                    .sort((a, b) => {
                        const nameA = a.title || a.name;
                        const nameB = b.title || b.name;
                        return nameA.localeCompare(nameB, undefined, { numeric: true, sensitivity: 'base' });
                    });

                document.getElementById('track-count').innerText = tracks.length;
                
                // Set zip link - Archive.org typically provides a zip for the original files
                zipBtn.href = `${downloadUrl}/${identifier}_vbr_mp3.zip`;
                
                renderTracks();
                setLoading(100);
            } catch (error) {
                console.error("Fetch Error:", error);
                trackListContainer.innerHTML = `<p class="text-red-500 text-center py-10">Archive unavailable. Try again later.</p>`;
            }
        }

        function setLoading(percent) {
            loadingIndicator.style.opacity = '1';
            loadingIndicator.style.width = percent + '%';
            if (percent === 100) {
                setTimeout(() => {
                    loadingIndicator.style.opacity = '0';
                    setTimeout(() => loadingIndicator.style.width = '0%', 300);
                }, 500);
            }
        }

        function renderTracks() {
            trackListContainer.innerHTML = '';
            tracks.forEach((track, index) => {
                const title = track.title || track.name.replace('.mp3', '').replace(/_/g, ' ');
                const fileUrl = `${downloadUrl}/${track.name}`;
                const row = document.createElement('div');
                row.className = 'track-row grid grid-cols-[32px_1fr_80px_40px] md:grid-cols-[32px_1fr_100px_80px_40px] gap-4 px-4 py-2 rounded-md group cursor-pointer transition-colors items-center';
                
                row.innerHTML = `
                    <div class="flex items-center">
                        <span class="text-zinc-500 group-hover:hidden text-xs">${index + 1}</span>
                        <i data-lucide="play" class="w-3 h-3 text-white hidden group-hover:block fill-white"></i>
                    </div>
                    <span class="text-zinc-200 truncate font-medium track-title-text text-sm">${title}</span>
                    <span class="text-zinc-500 text-xs hidden md:block">${(track.size / 1024 / 1024).toFixed(1)} MB</span>
                    <span class="text-zinc-500 text-xs flex justify-end">MP3</span>
                    <div class="flex justify-end opacity-0 group-hover:opacity-100 transition-opacity">
                        <a href="${fileUrl}" download="${track.name}" class="text-zinc-400 hover:text-white" onclick="event.stopPropagation()">
                            <i data-lucide="download" class="w-4 h-4"></i>
                        </a>
                    </div>
                `;
                row.onclick = () => loadTrack(index);
                trackListContainer.appendChild(row);
            });
            lucide.createIcons();
        }

        function loadTrack(index) {
            if (index < 0 || index >= tracks.length) return;
            setLoading(50);
            currentIndex = index;
            const track = tracks[index];
            audio.src = `${downloadUrl}/${track.name}`;
            currentTitleEl.innerText = track.title || track.name.replace('.mp3', '').replace(/_/g, ' ');
            
            document.querySelectorAll('.track-row').forEach((row, i) => {
                row.classList.toggle('active', i === index);
            });

            audio.oncanplay = () => {
                setLoading(100);
                playTrack();
            };
        }

        function playTrack() {
            audio.play().then(() => {
                isPlaying = true;
                updateUI();
            }).catch(e => console.warn("Playback error", e));
        }

        function pauseTrack() {
            audio.pause();
            isPlaying = false;
            updateUI();
        }

        function updateUI() {
            const iconName = isPlaying ? 'pause' : 'play';
            
            // Footer Icon
            playPauseBtn.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5 fill-black text-black ${iconName === 'play' ? 'ml-0.5' : ''}"></i>`;
            
            // Master Icon
            masterPlayBtn.innerHTML = `<i data-lucide="${iconName}" class="fill-black text-black ${iconName === 'play' ? 'ml-1' : ''}"></i>`;
            
            lucide.createIcons();
        }

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        playPauseBtn.onclick = () => currentIndex === -1 ? loadTrack(0) : (isPlaying ? pauseTrack() : playTrack());
        masterPlayBtn.onclick = playPauseBtn.onclick;

        nextBtn.onclick = () => {
            if (currentIndex < tracks.length - 1) loadTrack(currentIndex + 1);
        };

        prevBtn.onclick = () => {
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else if (currentIndex > 0) {
                loadTrack(currentIndex - 1);
            }
        };

        audio.ontimeupdate = () => {
            if (audio.duration) {
                progressSlider.value = (audio.currentTime / audio.duration) * 100;
                currentTimeEl.innerText = formatTime(audio.currentTime);
            }
        };

        audio.onloadedmetadata = () => {
            durationEl.innerText = formatTime(audio.duration);
        };

        audio.onended = () => {
            if (currentIndex < tracks.length - 1) nextBtn.onclick();
            else {
                isPlaying = false;
                updateUI();
            }
        };

        progressSlider.oninput = () => {
            if (audio.duration) {
                audio.currentTime = (progressSlider.value / 100) * audio.duration;
            }
        };

        volumeSlider.oninput = () => {
            audio.volume = volumeSlider.value / 100;
        };

        window.onload = () => {
            fetchArchiveData();
            audio.volume = 0.7;
            lucide.createIcons();
        };
    </script>
</body>
</html>
